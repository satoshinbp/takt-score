version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/store/queries"
    schema: "migrations"
    gen:
      go:
        package: "store"
        sql_package: "pgx/v5"
        out: "internal/store"
        emit_json_tags: false
        emit_pointers_for_null_types: true
        emit_enum_valid_method: true
        emit_interface: false
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
